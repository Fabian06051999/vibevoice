name: Release Windows Installer

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: Vibe Voice v__VERSION__
          releaseBody: |
            Download **Vibe Voice Tool_*_x64_en-US.msi** (or the German `.msi`) and double-click to install.

            After installation:
            1. Open Vibe Voice from the Start menu (it runs in the system tray)
            2. Right-click the tray icon → **Settings**
            3. Paste your own [Groq API key](https://console.groq.com/keys)
            4. Hold `Ctrl+Win` and start talking
          releaseDraft: false
          prerelease: false
          args: --bundles msi
